<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>رصيدي</title>
<style>body{text-align:center;padding:50px;font-family:Arial;background:#f2f2f2;margin:0}.box{background:white;padding:30px;border-radius:15px;max-width:400px;margin:auto}h1{color:#28a745}.btn{background:#007bff;color:white;padding:12px 20px;border:none;border-radius:8px;margin:10px;cursor:pointer}</style>
</head>
<body>
<div class="box">
<h1>💰 الرصيد الحالي</h1>
<h2 id="money">0 درهم</h2>
<p>عدد المحالين: <span id="refs">0</span></p>
<button class="btn" onclick="window.location='withdraw.html'">سحب المال</button>
<button class="btn" onclick="window.location='tasks.html'">الرجوع للمهام</button>
</div>
<script>
document.getElementById('money').innerText = (localStorage.getItem("balance") || "0") + " درهم";
document.getElementById('refs').innerText = localStorage.getItem("referrals") || "0";
</script>
</body></html>
