
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التسجيل</title>
<style>
body{background:#f5f5f5;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:15px;width:300px;box-shadow:0 0 10px rgba(0,0,0,0.1);}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:12px;background:#00bfff;color:white;border:none;border-radius:8px;cursor:pointer;font-size:16px;}
</style>
</head>
<body>

<div class="box">
  <h2 style="text-align:center;">إنشاء حساب جديد</h2>
  <input type="text" id="name" placeholder="الاسم الكامل">
  <input type="email" id="email" placeholder="البريد الإلكتروني">
  <input type="password" id="password" placeholder="كلمة السر">
  <button onclick="register()">تسجيل</button>
  <p style="text-align:center;">عندك حساب؟ <a href="Connexion.html">دخول</a></p>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRp...",
    authDomain: "shein-maroc-app.firebaseapp.com",
    projectId: "shein-maroc-app",
    storageBucket: "shein-maroc-app.appspot.com",
    appId: "1:105488018363:web:8cd91e29f3d5f..."
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.register = async function(){
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;

    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      const user = userCredential.user;
      
      await setDoc(doc(db, "users", user.uid), {
        name: name,
        email: email,
        balance: 0,
        createdAt: new Date()
      });

      alert("تم التسجيل بنجاح!");
      window.location.href = "tâches.html";

    } catch (error) {
      alert("خطأ: " + error.message);
    }
  }
</script>
</body>
</html>
