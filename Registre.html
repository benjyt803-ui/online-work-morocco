
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>التسجيل</title>
<style>
body{background:#f5f5f5;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;}
.boite{background:white;padding:30px;border-radius:15px;width:90%;max-width:350px;}
input{width:100%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;}
button{width:100%;padding:12px;background:#00bfff;color:white;border:none;border-radius:8px;}
</style>
</head>
<body>
<div class="boite">
  <h2>إنشاء حساب جديد</h2>
  <input type="text" id="nom" placeholder="الاسم">
  <input type="email" id="email" placeholder="الايميل">
  <input type="password" id="motdepasse" placeholder="كلمة السر">
  <button onclick="registre()">تسجيل</button>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";
  const firebaseConfig = {
    apiKey: "AIzaSyA6fo63qKcstFX8xFhGUD5wIRprabL0qso",
    authDomain: "shein-maroc-app.firebaseapp.com",
    projectId: "shein-maroc-app",
    storageBucket: "shein-maroc-app.firebasestorage.app",
    messagingSenderId: "105488018363",
    appId: "1:105488018363:web:04595ef4d6f2dcff2ab29e"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window.registre = async function(){
    const nom = document.getElementById('nom').value;
    const email = document.getElementById('email').value;
    const motdepasse = document.getElementById('motdepasse').value;
    const userCredential = await createUserWithEmailAndPassword(auth, email, motdepasse);
    await setDoc(doc(db, "users", userCredential.user.uid), {name: nom, email: email, balance: 0});
    alert("تم التسجيل!");
    window.location.href = "tâches.html";
  }
</script>
</body>
</html>
