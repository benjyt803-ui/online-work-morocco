<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shein</title>
<style>
body{font-family:Arial;background:#f5f5f5;margin:0;text-align:center;padding:20px}
h1{color:#000;font-size:28px}
.logo{width:180px;margin:10px 0}
.ad-img{max-width:95%;border-radius:15px;margin:20px 0}
.stats{background:white;padding:15px;border-radius:10px;margin:20px auto;max-width:300px}
.stats h3{margin:5px 0;color:#25D366;font-size:24px}
</style>
</head>
<body>
<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/90/Shein_Logo.svg/1200px-Shein_Logo.svg.png" class="logo">
<h1>فرص عمل مع Shein</h1>
<div class="stats">
<p>👀 عدد الزوار</p>
<h3 id="visitors">0</h3>
<p>📱 عدد المهتمين</p>
<h3 id="clicks">0</h3>
</div>
<img src="https://i.imgur.com/kjH2Q9p.jpg" class="ad-img">
<p>📱 للتسجيل والاستفسار تواصل معنا دابا</p>
<div style="margin-top:20px">
<a href="https://wa.me/212783924189" onclick="addClick()" style="background:#25D366;color:white;padding:15px 30px;text-decoration:none;border-radius:50px;font-size:18px;font-weight:bold">📱 تواصل معنا فالواتساب</a>
</div>
<script>
let visitors=localStorage.getItem('visitors')||0;visitors++;localStorage.setItem('visitors',visitors);document.getElementById('visitors').innerText=visitors;
let clicks=localStorage.getItem('clicks')||0;document.getElementById('clicks').innerText=clicks;
function addClick(){clicks++;localStorage.setItem('clicks',clicks);}
</script>
</body>
</html>
