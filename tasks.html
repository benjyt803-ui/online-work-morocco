    <a href="fait.html">المهام المنجزة</a>
    <a href="sahb.html">سحب المال</a>
</div>

    <div id="minuteur">01:00:00</div>

    <button id="bouton_deconnexion" onclick="deconnexion()">تسجيل الخروج</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let argentActuel = 20;
    let tempsRestant = 60 * 60; // ساعة
    let intervalMinuteur;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userId = user.uid;
            const docRef = doc(db, "users", userId);
            const docSnap = await getDoc(docRef);
            let data = docSnap.data() || {};
            
            document.getElementById("equilibre").innerText = data.balance || 0;
            document.getElementById("referrals").innerText = data.referrals ? data.referrals.length : 0;

            // توليد الرابط ديال الاحالة
            const siteURL = "https://benjyt803-ui.github.io/online-work-morocco/Register.html";
            document.getElementById("refLink").value = `${siteURL}?ref=${userId}`;

            // التحقق من الاحالة
            const urlParams = new URLSearchParams(window.location.search);
            const ref = urlParams.get('ref');
            if(ref && ref !== userId && !data.referredBy){
                await setDoc(docRef, { referredBy: ref }, {merge: true});
                await setDoc(doc(db, "users", ref), {
                    balance: increment(50),
                    referrals: arrayUnion(userId)
                }, {merge: true});
            }
            
            commencerMinuteur();
        } else {
            window.location.href = "Login.html";
        }
    });
