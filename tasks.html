<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>المهام</title>
<style>
    body { font-family: Arial; background: #f2f2f2; text-align: center; padding: 20px; }
    .box { background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 10px auto; box-shadow: 0 0 10px #ccc; }
    #timer { font-size: 30px; font-weight: bold; color: red; margin: 15px 0; }
    button { background: #28a745; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 5px; width: 90%; }
    button:disabled { background: gray; }
    #logoutBtn { background: red; }
    a { text-decoration: none; color: #007bff; display: block; margin-top: 10px; }
</style>
</head>
<body>

<div class="box">
    <h2>مرحبا بك</h2>
    <p>الرصيد الحالي: <span id="balance">0</span> درهم</p>
    <a href="done.html">المهام المنجزة</a>
    <a href="sahb.html">سحب المال</a>
</div>

<div class="box">
    <h3>مهمة مشاهدة الفيديو - 20 درهم</h3>
    <video id="video" width="100%" controls>
        <source src="video.mp4" type="video/mp4">
    </video>
    <div id="timer">01:00:00</div>
    <button id="finishBtn" onclick="finishTask()" disabled>انتظر حتى ينتهي العداد</button>
    <button id="logoutBtn" onclick="logout()">تسجيل الخروج</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, increment, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = { /* حط الكونفيغ ديالك هنا */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userId = null;
    let currentMoney = 20;
    let timeLeft = 60 * 60; 
    let timerInterval;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userId = user.uid;
            const docRef = doc(db, "users", userId);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                document.getElementById("balance").innerText = docSnap.data().balance || 0;
            }
            startTimer();
        } else {
            window.location.href = "Login.html";
        }
    });

    function startTimer(){
        timerInterval = setInterval(() => {
            timeLeft--;
            let h = Math.floor(timeLeft / 3600);
            let m = Math.floor((timeLeft % 3600) / 60);
            let s = timeLeft % 60;
            document.getElementById("timer").innerText = `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            if(timeLeft <= 0){
                clearInterval(timerInterval);
                document.getElementById("finishBtn").disabled = false;
                document.getElementById("finishBtn").innerText = "اضغط لاستلام 20 درهم";
            }
        }, 1000);
    }

    async function saveEarnings(){
        const docRef = doc(db, "users", userId);
        const date = new Date().toLocaleString("ar-MA");
        try {
            await setDoc(docRef, {
                balance: increment(currentMoney),
                doneTasks: arrayUnion({task: "مشاهدة فيديو", money: currentMoney, date: date})
            }, {merge: true});
            alert(`مبروك! تم اضافة ${currentMoney} درهم لرصيدك`);
            location.reload();
        } catch (error) {
            alert("خطأ: " + error.message);
        }
    }

    window.finishTask = function(){
        clearInterval(timerInterval);
        saveEarnings();
